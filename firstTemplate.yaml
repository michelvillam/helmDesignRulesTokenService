      securityContext:
        supplementalGroups: 
        - 206
      volumes:
        - name: app-deployment-volume
          emptyDir:
            sizeLimit: 512Mi
      serviceAccountName: eric-odp-token-service-sa
      containers:
      - name: eric-odp-token-service
        image: armdocker.rnd.ericsson.se/REPO_PATH/eric-odp-token-service:VERSION
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        ports:
        - name: rest
          containerPort: 8443
          protocol: TCP
        env:
        - name: ODP_TOKEN_SERVICE_HOSTNAME
          value: "eric-odp-token-service"
        - name: ODP_TOKEN_SERVICE_HTTP_PORT
          value: "8443"
        - name: SSO_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eric-odp-token-service-configmap
              key: sso_service_url
        - name: SERVICE_ID
          value: "eric-odp-token-service"
        - name: JAVA_OPTS
          value: -XX:InitialRAMPercentage=60.000000 -XX:MaxRAMPercentage=60.000000 -XX:MinRAMPercentage=60.000000
        - name: TZ
          value: "UTC"
        resources:
          requests:
            cpu: "1000m"
            memory: "768Mi"
          limits:
            cpu: "1500m"
            memory: "1024Mi"
        volumeMounts:
          - name: app-deployment-volume
            mountPath: "/ericsson/3pp/jboss"
        startupProbe:
          exec:
            command:
              - /scripts/microservice_startup_healthcheck.sh
          failureThreshold: 5
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 10
        livenessProbe:
          exec:
            command:
              - /scripts/microservice_healthcheck.sh
          failureThreshold: 3
          initialDelaySeconds: 80
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
              - /scripts/microservice_healthcheck.sh
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10

      nodeSelector: 
      
      terminationGracePeriodSeconds:
        30
      tolerations: 
        - effect: NoExecute
          key: node.kubernetes.io/unreachable
          operator: Exists
          tolerationSeconds: 10
      topologySpreadConstraints: 
        []
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - eric-odp-token-service
