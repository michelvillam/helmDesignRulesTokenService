spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eric-odp-token-service
      app.kubernetes.io/instance: zalamiginstallation
  strategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: "eric-odp-token-service"
        app.kubernetes.io/instance: "zalamiginstallation"
        app.kubernetes.io/managed-by: "Helm"
        app.kubernetes.io/name: "eric-odp-token-service"
        app.kubernetes.io/version: "0.1.0-1"
        chart: "eric-odp-token-service-0.1.0-1"
        helm.sh/chart: "eric-odp-token-service-0.1.0-1"
      annotations:
        ericsson.com/product-name: "eric-odp-token-service HELM"
        ericsson.com/product-number: "CXC 201 0000"
